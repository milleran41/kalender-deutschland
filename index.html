<!doctype html>
<html lang="de" class="h-full" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender Deutschland</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/atlas.css">
  <link rel="stylesheet" href="css/history.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Fallback: показать контент, даже если JS упадет */
    #app { display: block !important; visibility: visible !important; }
    .loading-overlay { position: fixed; inset: 0; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; }
  </style>
</head>
<body class="h-full bg-[#0f172a] text-[#e2e8f0]">
  <div id="loadingScreen" class="loading-overlay">⏳ Загрузка календаря...</div>
  
  <div id="app" class="app-root dark">
    <header id="header" class="w-full sticky top-0 z-50 px-4 py-3 flex items-center justify-between gap-3 flex-wrap bg-inherit border-b-2 border-slate-600">
      <div class="flex items-center gap-3" style="flex-shrink: 0;">
        <h1 id="appTitle" class="text-lg font-bold">Kalender Deutschland</h1>
        <div class="flex items-center gap-1">
          <button id="btnYearPrev" class="p-1 rounded hover:bg-white/10 cursor-pointer"><i data-lucide="chevron-left" class="w-[18px] h-[18px]"></i></button>
          <span id="yearDisplay" class="font-bold text-base min-w-[50px] text-center">2026</span>
          <button id="btnYearNext" class="p-1 rounded hover:bg-white/10 cursor-pointer"><i data-lucide="chevron-right" class="w-[18px] h-[18px]"></i></button>
          <button id="btnGotoDate" class="p-1 ml-1 rounded hover:bg-white/10 opacity-70 hover:opacity-100 transition-opacity cursor-pointer" title="Go to date"><i data-lucide="calendar-search" class="w-[18px] h-[18px]"></i></button>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap" style="margin-left: auto;">
        <button id="btnWorkMode" class="p-1.5 rounded hover:bg-white/10 flex items-center gap-1 cursor-pointer" title="Work Mode"><i data-lucide="settings-2" class="w-[16px] h-[16px]"></i></button>
        <button id="btnPrint" class="p-1.5 rounded hover:bg-white/10 cursor-pointer" title="Print"><i data-lucide="printer" class="w-[16px] h-[16px]"></i></button>
        <select id="regionSelect" class="text-xs py-1 px-2 cursor-pointer"></select>
        <select id="langSelect" class="text-xs py-1 px-2 cursor-pointer"></select>
        <button id="btnToggleTheme" class="p-1.5 rounded hover:bg-white/10 cursor-pointer" title="Theme"><i data-lucide="sun" class="w-[16px] h-[16px]"></i></button>
        <button id="btnAddEvent" class="btn-primary text-xs flex items-center gap-1 cursor-pointer"><i data-lucide="plus" class="w-[14px] h-[14px]"></i> <span data-t="add_date">Datum hinzufügen</span></button>
      </div>
    </header>

    <div class="w-full px-4 py-2 flex items-center justify-between flex-wrap gap-2 text-xs">
      <div class="flex gap-2 flex-wrap items-center" id="filters"></div>
      <div class="flex gap-4 flex-wrap" id="globalStats"></div>
    </div>
    
    <div class="w-full px-4 pb-2">
      <div id="historyBlock" class="history-block text-xs leading-relaxed hidden">
        <div class="font-bold mb-1 flex items-center gap-2"><i data-lucide="history"></i> <span id="historyTitle"></span></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2" style="display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important;">
          <div><span class="opacity-70 font-bold" id="historyRegimeLabel">Режим работы:</span> <span id="historyRegime"></span></div>
          <div><span class="opacity-70 font-bold" id="historyFactLabel">Факт:</span> <span id="historyFact"></span></div>
        </div>
      </div>
    </div>

    <div id="calendarGrid" class="px-4 pb-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
      <!-- Сюда JS вставит месяцы -->
    </div>
    
    <div class="footer-atlas-row w-full px-4 pb-6 mt-4">
      <div class="footer-action-group">
        <button id="btnOpenAtlas" class="btn-secondary flex items-center gap-2 shadow-lg hover:shadow-xl transition-all" style="border-radius: 30px; padding: 10px 24px; border: 2px solid #6366f1;">
          <i data-lucide="map" class="w-[20px] h-[20px]"></i> <span class="font-bold text-sm">Atlas von Deutschland</span>
        </button>
        <button id="btnOpenHistory" class="btn-secondary flex items-center gap-2 shadow-lg hover:shadow-xl transition-all" style="border-radius: 30px; padding: 10px 24px; border: 2px solid #6366f1;">
          <i data-lucide="landmark" class="w-[20px] h-[20px]"></i> <span class="font-bold text-sm">История Германии</span>
        </button>
      </div>
      <div class="brand-milleran" aria-label="milleran">milleran</div>
    </div>

    <div id="modalContainer"></div>
    <div id="atlasContainer"></div>
  </div>

  <script src="js/lucide.min.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/app.js"></script>
  <script src="js/events.js"></script>
  <script src="js/leaflet.js"></script>
  <script src="js/atlas-data.js"></script>
  <script src="js/atlas.js"></script>
  <script src="js/history-data.js"></script>
  <script src="js/history-extra.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
